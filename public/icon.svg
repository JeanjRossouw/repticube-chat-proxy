<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" fill="#0E2A1A"/>

  <!-- Subtle inner border -->
  <rect x="16" y="16" width="480" height="480" rx="88" fill="none" stroke="#1F6B3A" stroke-width="2" opacity="0.4"/>

  <!-- Gecko silhouette - top-down view, S-curved body like a real gecko -->
  <g transform="translate(256, 256) rotate(-20)">
    <!-- Main body curve (S shape) -->
    <path d="
      M -160,-10
      C -150,-50 -110,-80 -60,-70
      C -10,-60 30,-30 50,10
      C 70,40 100,50 130,30
      C 155,15 170,-15 165,-45
      L 195,-55
      Q 215,-58 218,-40
      Q 220,-22 200,-20
      L 175,-15
      C 180,15 165,55 130,75
      C 90,95 40,90 0,70
      C -40,50 -70,15 -90,-10
      C -110,-30 -130,-30 -150,-15
      C -160,-8 -165,-5 -160,-10 Z"
      fill="#1F6B3A"/>

    <!-- Head detail (front of body, slight bulge) -->
    <ellipse cx="195" cy="-40" rx="30" ry="20" fill="#1F6B3A"/>

    <!-- Tail (long, tapered, curling back) -->
    <path d="
      M -150,-15
      C -195,-20 -230,-35 -250,-65
      C -265,-90 -250,-115 -225,-115
      C -205,-115 -195,-100 -200,-85"
      stroke="#1F6B3A" stroke-width="28" stroke-linecap="round" fill="none"/>
    <!-- Tail tip taper -->
    <path d="
      M -200,-85
      C -202,-78 -200,-72 -195,-72"
      stroke="#1F6B3A" stroke-width="18" stroke-linecap="round" fill="none"/>

    <!-- Front legs (closer to head) -->
    <!-- Right front leg -->
    <path d="M 130,30 C 155,55 165,80 150,100 C 140,110 125,108 120,95"
          stroke="#1F6B3A" stroke-width="22" stroke-linecap="round" fill="none"/>
    <!-- Toe pads on right front -->
    <circle cx="148" cy="103" r="9" fill="#1F6B3A"/>
    <circle cx="135" cy="110" r="8" fill="#1F6B3A"/>
    <circle cx="122" cy="105" r="8" fill="#1F6B3A"/>

    <!-- Left front leg -->
    <path d="M 70,-40 C 90,-75 80,-105 55,-110 C 35,-114 25,-100 35,-85"
          stroke="#1F6B3A" stroke-width="22" stroke-linecap="round" fill="none"/>
    <circle cx="50" cy="-110" r="9" fill="#1F6B3A"/>
    <circle cx="35" cy="-112" r="8" fill="#1F6B3A"/>
    <circle cx="25" cy="-100" r="8" fill="#1F6B3A"/>

    <!-- Back legs (closer to tail) -->
    <!-- Right back leg -->
    <path d="M -50,40 C -30,75 -40,105 -65,108 C -85,110 -95,95 -85,80"
          stroke="#1F6B3A" stroke-width="22" stroke-linecap="round" fill="none"/>
    <circle cx="-70" cy="108" r="9" fill="#1F6B3A"/>
    <circle cx="-85" cy="105" r="8" fill="#1F6B3A"/>
    <circle cx="-90" cy="92" r="8" fill="#1F6B3A"/>

    <!-- Left back leg -->
    <path d="M -120,-30 C -140,-65 -125,-95 -100,-100 C -82,-103 -75,-90 -83,-78"
          stroke="#1F6B3A" stroke-width="22" stroke-linecap="round" fill="none"/>
    <circle cx="-95" cy="-100" r="9" fill="#1F6B3A"/>
    <circle cx="-80" cy="-100" r="8" fill="#1F6B3A"/>
    <circle cx="-72" cy="-88" r="8" fill="#1F6B3A"/>

    <!-- Eye (gold accent) -->
    <circle cx="200" cy="-45" r="9" fill="#C9A24B"/>
    <ellipse cx="200" cy="-45" rx="3" ry="6" fill="#0E2A1A"/>

    <!-- Spine spots / texture -->
    <circle cx="-110" cy="-12" r="6" fill="#0E2A1A" opacity="0.35"/>
    <circle cx="-60" cy="-30" r="6" fill="#0E2A1A" opacity="0.35"/>
    <circle cx="-10" cy="-25" r="6" fill="#0E2A1A" opacity="0.35"/>
    <circle cx="40" cy="-5" r="6" fill="#0E2A1A" opacity="0.35"/>
    <circle cx="90" cy="5" r="6" fill="#0E2A1A" opacity="0.35"/>
    <circle cx="135" cy="-5" r="5" fill="#0E2A1A" opacity="0.35"/>
  </g>
</svg>
